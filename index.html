<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Notes · Demo 管理中心</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f6f8fb;--s1:#ffffff;--s2:#f0f4f8;--s3:#e8edf3;
  --bd:#dfe4ec;--bd2:#c8d0dc;
  --tx:#1a1f36;--su:#4a5568;--mu:#718096;--dm:#a0aec0;
  --bl:#4f6ef7;--am:#e8930c;--pu:#8b5cf6;--gn:#10b981;--rd:#ef4444;--cy:#06b6d4;
  --bl-bg:#eef2ff;--am-bg:#fef3c7;--pu-bg:#f3e8ff;--gn-bg:#d1fae5;--rd-bg:#fee2e2;--cy-bg:#cffafe;
  --radius:14px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans SC',sans-serif;min-height:100vh;padding:0}

/* hero - 简洁渐变顶栏 */
.hero{background:linear-gradient(135deg,#4f6ef7 0%,#7c5cf5 40%,#06b6d4 100%);padding:40px 24px 64px;text-align:center;position:relative}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:40px;background:var(--bg);border-radius:40px 40px 0 0}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:5px 16px;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;color:rgba(255,255,255,.9);margin-bottom:14px}
.hero h1{font-size:30px;font-weight:700;letter-spacing:-.02em;color:#fff;margin-bottom:8px}
.hero p{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:20px}
.stats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.15);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 24px;text-align:center}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#fff}
.stat-label{font-size:10px;color:rgba(255,255,255,.65);margin-top:2px}

/* main container - 全宽 */
.main{max-width:1400px;margin:0 auto;padding:0 32px 60px;position:relative;z-index:2}

/* toolbar */
.toolbar{display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--bd);border-radius:12px;background:var(--s1);font-size:13px;font-family:'Noto Sans SC',sans-serif;color:var(--tx);outline:none;transition:all .2s}
.search-box input:focus{border-color:var(--bl);box-shadow:0 0 0 3px rgba(79,110,247,.1)}
.search-box input::placeholder{color:var(--dm)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dm);width:16px;height:16px}
.view-toggle{display:flex;border:1.5px solid var(--bd);border-radius:10px;overflow:hidden;background:var(--s1)}
.view-btn{padding:8px 14px;cursor:pointer;font-size:14px;border:none;background:none;color:var(--mu);transition:all .2s}
.view-btn.active{background:var(--bl);color:#fff}

/* sync button */
.sync-btn{display:flex;align-items:center;gap:6px;padding:8px 18px;border:1.5px solid var(--bl);border-radius:12px;background:var(--bl-bg);color:var(--bl);font-size:13px;font-weight:600;font-family:'Noto Sans SC',sans-serif;cursor:pointer;transition:all .25s;white-space:nowrap}
.sync-btn:hover{background:var(--bl);color:#fff;transform:translateY(-1px);box-shadow:0 4px 14px rgba(79,110,247,.25)}
.sync-btn:active{transform:scale(.97)}

/* toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:var(--tx);color:#fff;padding:14px 24px;border-radius:14px;font-size:13px;z-index:999;box-shadow:0 12px 40px rgba(0,0,0,.15);transition:transform .4s cubic-bezier(.4,0,.2,1);max-width:90vw;text-align:center;line-height:1.6}
.toast.show{transform:translateX(-50%) translateY(0)}

/* filters */
.filters{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.filter-btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--bd);border-radius:24px;padding:7px 16px;cursor:pointer;transition:all .25s;background:var(--s1);font-family:'Noto Sans SC',sans-serif;font-size:12px;font-weight:500;color:var(--su)}
.filter-btn:hover{border-color:var(--bd2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.04)}
.filter-btn.active{color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(0,0,0,.1)}
.filter-btn.active[data-cat="all"]{background:var(--bl)}
.filter-btn.active[data-cat="interaction"]{background:var(--bl)}
.filter-btn.active[data-cat="product"]{background:var(--am)}
.filter-btn.active[data-cat="serious"]{background:var(--pu)}
.filter-btn.active[data-cat="combined"]{background:var(--gn)}
.filter-btn.active[data-cat="claw"]{background:var(--cy)}
.filter-btn.active[data-cat="pm"]{background:var(--rd)}
.filter-btn .count{font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 7px;border-radius:10px;background:rgba(0,0,0,.06)}
.filter-btn.active .count{background:rgba(255,255,255,.25);color:#fff}

/* timeline */
.date-group{margin-bottom:28px;animation:fadeUp .4s ease both}
.date-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.date-dot{width:10px;height:10px;border-radius:50%;background:var(--bl);box-shadow:0 0 0 4px var(--bl-bg);flex-shrink:0}
.date-label{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--su);font-weight:500;white-space:nowrap}
.date-count{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dm);background:var(--s2);padding:2px 8px;border-radius:8px;white-space:nowrap}
.date-line{height:1px;flex:1;background:linear-gradient(to right,var(--bd),transparent)}

/* cards grid - 3列为主 */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.cards.list-view{grid-template-columns:1fr;gap:10px}

/* card */
.card{display:block;background:var(--s1);border:1.5px solid var(--bd);border-radius:var(--radius);padding:18px 20px;text-decoration:none;color:var(--tx);transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;cursor:pointer}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--ac);border-radius:4px 0 0 4px;opacity:0;transition:opacity .3s}
.card:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04)}
.card:hover::before{opacity:1}
.card-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.card-ver{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border-radius:8px;font-weight:600}
.card-ver.c-bl{background:var(--bl-bg);color:var(--bl)}
.card-ver.c-am{background:var(--am-bg);color:var(--am)}
.card-ver.c-pu{background:var(--pu-bg);color:var(--pu)}
.card-ver.c-gn{background:var(--gn-bg);color:var(--gn)}
.card-ver.c-rd{background:var(--rd-bg);color:var(--rd)}
.card-ver.c-cy{background:var(--cy-bg);color:var(--cy)}
.card-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--dm)}
.card-title{font-size:14px;font-weight:600;margin-bottom:5px;line-height:1.5}
.card-desc{font-size:12px;color:var(--mu);line-height:1.6;margin-bottom:12px}
.card-foot{display:flex;justify-content:space-between;align-items:center}
.card-cat{font-size:10px;padding:3px 10px;border-radius:8px;font-weight:500;display:inline-flex;align-items:center;gap:4px}
.card-cat.c-bl{background:var(--bl-bg);color:var(--bl)}
.card-cat.c-am{background:var(--am-bg);color:var(--am)}
.card-cat.c-pu{background:var(--pu-bg);color:var(--pu)}
.card-cat.c-gn{background:var(--gn-bg);color:var(--gn)}
.card-cat.c-rd{background:var(--rd-bg);color:var(--rd)}
.card-cat.c-cy{background:var(--cy-bg);color:var(--cy)}
.card-open{font-size:12px;color:var(--ac);font-weight:500;opacity:0;transition:all .3s;transform:translateX(-4px)}
.card:hover .card-open{opacity:1;transform:translateX(0)}

/* list view */
.list-view .card{display:flex;align-items:center;gap:16px;padding:12px 20px}
.list-view .card-head{margin-bottom:0;flex-shrink:0;width:80px}
.list-view .card-body{flex:1;min-width:0}
.list-view .card-title{margin-bottom:2px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-view .card-desc{margin-bottom:0;font-size:11px}
.list-view .card-foot{flex-shrink:0}

/* empty */
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-text{font-size:14px;color:var(--mu)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

@media(max-width:1100px){.cards{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .hero{padding:32px 16px 56px}
  .hero h1{font-size:24px}
  .main{padding:0 16px 40px}
  .cards{grid-template-columns:1fr}
  .toolbar{flex-direction:column}
  .search-box{min-width:100%}
}
@media(max-width:400px){
  .filters{gap:6px}
  .filter-btn{padding:6px 12px;font-size:11px}
}
</style>
</head>

  {file:"demos/xiaomi-ai-note.html",title:"小米 AI Note：系统级数字记忆",desc:"小米 AI Note：系统级数字记忆",cat:"product",catName:"产品定义",catIcon:"📐",color:"am",date:"2026-04-18",time:"20:37",ver:"ai-note"}
];
const CATS=[
  {id:"all",name:"全部",icon:"📋"},
  {id:"interaction",name:"交互演示",icon:"🎯"},
  {id:"product",name:"产品定义",icon:"📐"},
  {id:"serious",name:"严肃创作",icon:"✍️"},
  {id:"combined",name:"完整版",icon:"📦"},
  {id:"claw",name:"Claw光线",icon:"✨"},
  {id:"pm",name:"项目管理",icon:"📊"},
];
let activeCat="all",searchQuery="",viewMode="grid";
function getFiltered(){
  let l=activeCat==="all"?DEMOS:DEMOS.filter(d=>d.cat===activeCat);
  if(searchQuery){const q=searchQuery.toLowerCase();l=l.filter(d=>(d.title+d.desc+d.ver+d.catName).toLowerCase().includes(q))}
  return l;
}
function renderStats(){
  const c=new Set(DEMOS.map(d=>d.cat)),dy=new Set(DEMOS.map(d=>d.date));
  document.getElementById("stats").innerHTML=`<div class="stat"><div class="stat-num">${DEMOS.length}</div><div class="stat-label">总 Demo</div></div><div class="stat"><div class="stat-num">${c.size}</div><div class="stat-label">分类</div></div><div class="stat"><div class="stat-num">${dy.size}</div><div class="stat-label">天</div></div>`;
}
function renderFilters(){
  document.getElementById("filters").innerHTML=CATS.map(c=>{
    const n=c.id==="all"?DEMOS.length:DEMOS.filter(d=>d.cat===c.id).length;
    return `<button class="filter-btn ${activeCat===c.id?'active':''}" data-cat="${c.id}" onclick="setFilter('${c.id}')">${c.icon} ${c.name} <span class="count">${n}</span></button>`;
  }).join("");
}
function setFilter(c){activeCat=c;renderFilters();renderTimeline()}
function onSearch(){searchQuery=document.getElementById("searchInput").value;renderTimeline()}
function setView(v){viewMode=v;document.getElementById("vGrid").className="view-btn"+(v==="grid"?" active":"");document.getElementById("vList").className="view-btn"+(v==="list"?" active":"");renderTimeline()}
function renderTimeline(){
  const f=getFiltered(),em=document.getElementById("emptyState"),el=document.getElementById("timeline");
  if(!f.length){el.innerHTML="";em.style.display="block";return}
  em.style.display="none";
  const g={};f.forEach(d=>{if(!g[d.date])g[d.date]=[];g[d.date].push(d)});
  const ds=Object.keys(g).sort((a,b)=>b.localeCompare(a));
  el.innerHTML=ds.map((date,i)=>{
    const cards=g[date].sort((a,b)=>b.time.localeCompare(a.time));
    return `<div class="date-group" style="animation-delay:${i*50}ms"><div class="date-header"><div class="date-dot"></div><div class="date-label">${formatDate(date)}</div><div class="date-count">${cards.length} 个</div><div class="date-line"></div></div><div class="cards ${viewMode==='list'?'list-view':''}">${cards.map(renderCard).join("")}</div></div>`;
  }).join("");
}
function formatDate(d){const[y,m,day]=d.split("-");const w=["日","一","二","三","四","五","六"];return `${+m}月${+day}日 · 周${w[new Date(d).getDay()]}`}
function renderCard(d){
  if(viewMode==="list")return `<a href="${d.file}" target="_blank" class="card" style="--ac:var(--${d.color})"><div class="card-head"><span class="card-ver c-${d.color}">${d.ver}</span></div><div class="card-body"><div class="card-title">${d.title}</div><div class="card-desc">${d.desc}</div></div><div class="card-foot"><span class="card-time">🕐 ${d.time}</span><span class="card-open">打开 →</span></div></a>`;
  return `<a href="${d.file}" target="_blank" class="card" style="--ac:var(--${d.color})"><div class="card-head"><span class="card-ver c-${d.color}">${d.ver}</span><span class="card-time">🕐 ${d.time}</span></div><div class="card-title">${d.title}</div><div class="card-desc">${d.desc}</div><div class="card-foot"><span class="card-cat c-${d.color}">${d.catIcon} ${d.catName}</span><span class="card-open">打开 →</span></div></a>`;
}
renderStats();renderFilters();renderTimeline();

function showSyncTip(){
  let t=document.getElementById('syncToast');
  if(!t){t=document.createElement('div');t.id='syncToast';t.className='toast';document.body.appendChild(t)}
  t.innerHTML='🔄 请在 Kiro 左侧 Agent Hooks 面板<br>点击「一键同步 Demo 到管理后台」按钮';
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>t.classList.remove('show'),4000);
}
